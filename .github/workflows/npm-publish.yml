name: npm-publish
on:
  push:
    branches: [main, restore-v18-source-angular-v21]
jobs:
  npm-publish:
    name: npm-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'
    - run: npm ci --legacy-peer-deps
    - run: node node_modules/@angular/cli/bin/ng build AngularUtilities --configuration production
    - name: Auto-increment patch version and publish
      run: |
        cd dist/angular-utilities
        CURRENT=$(npm view @saydar/table-builder version 2>/dev/null || echo "0.0.0")
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        if [ "${{ github.ref_name }}" = "main" ]; then
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          npm version "$NEXT" --no-git-tag-version
          npm publish --access public --provenance
        else
          BETA=$(npm view @saydar/table-builder dist-tags.beta 2>/dev/null || echo "0.0.0-beta.0")
          BASE="${MAJOR}.${MINOR}.$((PATCH + 1))"
          # increment beta prerelease number if same base version
          if [[ "$BETA" == "${BASE}-beta."* ]]; then
            N="${BETA##*-beta.}"
            NEXT="${BASE}-beta.$((N + 1))"
          else
            NEXT="${BASE}-beta.0"
          fi
          npm version "$NEXT" --no-git-tag-version
          npm publish --access public --provenance --tag beta
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
