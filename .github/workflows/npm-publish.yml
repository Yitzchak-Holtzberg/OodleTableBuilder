name: npm-publish
on:
  release:
    types: [published]
jobs:
  npm-publish:
    name: npm-publish
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@master
    - name: Set up Node.js
      uses: actions/setup-node@master
      with:
        node-version: '16.13'
    - run: npm install
    - run: node node_modules/@angular/cli/bin/ng build AngularUtilities --configuration production
    - run: echo '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > .npmrc
    - run: npm publish dist/angular-utilities --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
