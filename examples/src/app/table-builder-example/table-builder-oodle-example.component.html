<div class="page rounded-card mat-elevation-z1">
  <div appearance="outlined" class="rounded-card search-card filters-container">
    <mat-button-toggle-group [value]="isLinesView ? 'lines' : 'summary'" (change)="isLinesView = $event.value === 'lines'">
      <mat-button-toggle value="summary">Summary</mat-button-toggle>
      <mat-button-toggle value="lines">Lines</mat-button-toggle>
    </mat-button-toggle-group>

    <!-- Without Lines View -->
    @if (!isLinesView) {
      <div class="chargeback-table-container mat-elevation-z2 rounded-card">
        <tb-table-container isVs [offset]="100" [tableBuilder]="tableBuilder" tableId="chargebacks" class="chargeback-table">
          <ng-container customCell="notes" matColumnDef="notes">
            <mat-cell *matCellDef="let element = element">
              <span>{{ element.notes || "-" }}</span>
              <span class="flex-spacer"></span>
              <button mat-icon-button [matMenuTriggerFor]="menu" class="menu-button-mover">
                <mat-icon color="primary">more_vert</mat-icon>
              </button>
              <mat-menu #menu="matMenu">
                <button mat-menu-item>
                  <mat-icon color="primary">receipt_long</mat-icon>
                  <span>View Profile</span>
                </button>
                <button mat-menu-item>
                  <span>Compare Term</span>
                </button>
                <button mat-menu-item>
                  <span>Open Timeline</span>
                </button>
                <button mat-menu-item>
                  <mat-icon color="primary">send</mat-icon>
                  <span>Share Record</span>
                </button>
                <button mat-menu-item>
                  <mat-icon color="primary">edit</mat-icon>
                  <span>Edit Notes</span>
                </button>
                <button mat-menu-item>
                  <mat-icon color="warn">email</mat-icon>
                  <span>Email Summary</span>
                </button>
                <button mat-menu-item>
                  <mat-icon color="warn">delete_forever</mat-icon>
                  <span>Archive</span>
                </button>
                <button mat-menu-item>
                  <mat-icon color="primary">picture_as_pdf</mat-icon>
                  <span>View Brief</span>
                </button>
              </mat-menu>
            </mat-cell>
          </ng-container>
        </tb-table-container>
      </div>
    }

    <!-- With Lines View -->
    @if (isLinesView) {
      <div class="chargeback-table-container mat-elevation-z2 rounded-card">
        <tb-table-container isVs [offset]="100" [tableBuilder]="tableBuilderWithLines" tableId="chargebacksWithLines" class="chargeback-table">
        <ng-container customCell="eventName" matColumnDef="eventName">
          <mat-cell *matCellDef="let element = element">
            {{ element.eventName }}
            <span class="flex-spacer"></span>
            <button mat-icon-button [matMenuTriggerFor]="menu" class="menu-button-mover">
              <mat-icon color="primary">more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item>
                <mat-icon color="primary">receipt_long</mat-icon>
                <span>View Initiative</span>
              </button>
              <button mat-menu-item>
                <span>Compare Year</span>
              </button>
              <button mat-menu-item>
                <mat-icon color="primary">send</mat-icon>
                <span>Share Record</span>
              </button>
              <button mat-menu-item>
                <mat-icon color="primary">edit</mat-icon>
                <span>Edit Notes</span>
              </button>
              <button mat-menu-item>
                <mat-icon color="primary">picture_as_pdf</mat-icon>
                <span>View Brief</span>
              </button>
              <button mat-menu-item>
                <span>Archive</span>
              </button>
            </mat-menu>
          </mat-cell>
        </ng-container>
      </tb-table-container>
    </div>
  }
</div>
</div>
