<ng-container *ngrxLet="dirty$ as dirty">
<ng-container *ngIf="sorted$ | async as sorted">
  <ng-container *ngIf="notSorted$ | async as notSorted">
    <!-- Menu Trigger -->
    <span matTooltip="Sort">
      <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon color="primary">swap_vert</mat-icon>
      </button>
    </span>

    <!-- Menu -->
    <mat-menu #menu="matMenu" class="my-mat-menu" (closed)="reset()">

      <!-- Sorted columns -->
      <ng-container *ngFor="let sort of sorted">
        <div mat-menu-item class="sort-checklist-item" stop-propagation (click)="removeSort(sort)">
          <mat-icon color="primary" class="check-icon">check_box</mat-icon>
          <span class="sorted-name">{{sort.displayName || (sort.active | spaceCase)}}</span>
          <button mat-icon-button class="direction-button" stop-propagation
            (click)="toggleDirection(sort)">
            <mat-icon class="direction-icon active-direction">
              {{sort.direction === SortDirection.asc ? 'arrow_upward' : 'arrow_downward'}}
            </mat-icon>
          </button>
        </div>
      </ng-container>

      <!-- Unsorted columns -->
      <ng-container *ngFor="let sort of notSorted">
        <div mat-menu-item class="sort-checklist-item" stop-propagation (click)="addSort(sort)">
          <mat-icon class="check-icon unchecked">check_box_outline_blank</mat-icon>
          <span class="not-sorted-name">{{sort.displayName || (sort.active | spaceCase)}}</span>
        </div>
      </ng-container>

      <!-- Apply -->
      <div class="apply-button-wrapper" stop-propagation>
        <button mat-button color="primary" (click)="apply(null)"
          [class.apply-border]="dirty"
          [disabled]="!dirty">
          Apply
        </button>
      </div>
    </mat-menu>
  </ng-container>
</ng-container>
</ng-container>
